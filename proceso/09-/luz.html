        class Vector2 {
            constructor(x = 0, y = 0) {
                this.x = x;
                this.y = y;
            }
        }
        class Vector3 {

            constructor(x = 0, y = 0, z = 0) {
                this.x = x;
                this.y = y;
                this.z = z;
            }
            
            add(vector) {
                return new Vector3(
                    this.x + vector.x,
                    this.y + vector.y,
                    this.z + vector.z
                );
            }
            subtract(vector) {
                return new Vector3(
                    this.x - vector.x,
                    this.y - vector.y,
                    this.z - vector.z
                );
            }
            multiply(vector) {
                return new Vector3(
                    this.x * vector.x,
                    this.y * vector.y,
                    this.z * vector.z
                );
            }
            
            rotateX(rad) {
                return new Vector3(
                    this.x,
                    this.y * Math.cos(rad) - this.z * Math.sin(rad),
                    this.y * Math.sin(rad) + this.z * Math.cos(rad)
                );
            }
            rotateY(rad) {
                return new Vector3(
                    this.x * Math.cos(rad) + this.z * Math.sin(rad),
                    this.y,
                    -this.x * Math.sin(rad) + this.z * Math.cos(rad)
                );
            }
            rotateZ(rad) {
                return new Vector3(
                    this.x * Math.cos(rad) - this.y * Math.sin(rad),
                    this.x * Math.sin(rad) + this.y * Math.cos(rad),
                    this.z
                );
            }
            
            dot(vec){
                return this.x * vec.x +
                    this.y * vec.y +
                    this.z * vec.z;
            }
            cross(vec){
                return new Vector3(
                    this.y * vec.z - this.z * vec.y,
                    this.z * vec.x - this.x * vec.z,
                    this.x * vec.y - this.y * vec.x
                );
            }

            normalize() {
                const length = this.length();

                if (length === 0)
                {   
                    return new Vector3();
                }
                return new Vector3(
                    this.x / length,
                    this.y / length,
                    this.z / length
                );
            }
            
            length() {
                return Math.sqrt(
                    this.x ** 2 +
                    this.y ** 2 +
                    this.z ** 2
                );
            }
            toString() {
                return `(${this.x.toFixed(6)}, ${this.y.toFixed(6)}, ${this.z.toFixed(6)})`;
            }
        }
        class Color{
            constructor(r = 255, g = 0, b = 0)
            {
                this.r = r;
                this.g = g;
                this.b = b;
            }

            multiply(valor) {
                return new Color(
                    Math.min(255, Math.max(0, this.r * valor)),
                    Math.min(255, Math.max(0, this.g * valor)),
                    Math.min(255, Math.max(0, this.b * valor))
                );
            }

            toString() {
                return `rgb(${this.r}, ${this.g}, ${this.b})`;
            }
        }

        class Primitivas{
            cubo(tamaño){
                const size = tamaño/2;
                let mesh = new Mesh();

                for (let x = -1; x <= 1; x+= 2)
                {
                    for (let y = -1; y <= 1; y+= 2)
                    {
                        for (let z = -1; z <= 1; z+= 2)
                        {
                            mesh.agregarVertice(new Vector3(x * size, y * size, z * size));
                        }
                    }
                }

                for (let i = 0; i < 8; i++)
                {
                    for(let l = i+1; l < 8; l++)
                    {
                        let dif = 0;
                        if (mesh.vertices[i].x != mesh.vertices[l].x)
                        {
                            dif++;
                        }
                        if (mesh.vertices[i].y != mesh.vertices[l].y)
                        {
                            dif++;
                        }
                        if (mesh.vertices[i].z != mesh.vertices[l].z)
                        {
                            dif++;
                        }
                        if(dif == 1)
                        {
                            mesh.agregarArista([i, l]);
                        }
                    }
                }
                
                {//triangulos
                    mesh.agregarTriangulo(new Triangulo(2, 6, 4));
                    mesh.agregarTriangulo(new Triangulo(2, 4, 0));
                    mesh.agregarTriangulo(new Triangulo(3, 7, 6));
                    mesh.agregarTriangulo(new Triangulo(3, 6, 2));
                    mesh.agregarTriangulo(new Triangulo(6, 7, 5));
                    mesh.agregarTriangulo(new Triangulo(6, 5, 4));
                    mesh.agregarTriangulo(new Triangulo(7, 3, 1));
                    mesh.agregarTriangulo(new Triangulo(7, 1, 5));
                    mesh.agregarTriangulo(new Triangulo(3, 2, 0));
                    mesh.agregarTriangulo(new Triangulo(3, 0, 1));
                    mesh.agregarTriangulo(new Triangulo(0, 4, 5));
                    mesh.agregarTriangulo(new Triangulo(0, 5, 1));
                }
         //                 3 -------- 7
         //               /|         /|
         //              / |        / |
         //             2 -------- 6  |
         //             |  |       |  |
         //             |  1 ------|--5
         //             | /        | /
         //             |/         |/
         //             0 -------- 4
                return mesh;
            }
            tetraedro(tamaño){
                const size = tamaño/2;
                let mesh = new Mesh();

               mesh.agregarVertice(new Vector3(-1 * size, -1 * size, 1 * size));
               mesh.agregarVertice(new Vector3(1 * size, -1 * size, 1 * size));
               mesh.agregarVertice(new Vector3(0, -1 * size, -1 * size));
               mesh.agregarVertice(new Vector3(0, 1 * size, 0));
               /*
               -1, -1, 1  // izquierda, abajo , lejos
               1, -1, 1   // derecha  , abajo , lejos
               0, -1, -1  // centro   , abajo , cerca
               0, 1, 0    // centro   , arriba, medio
               */
               mesh.agregarArista([0, 1]);
               mesh.agregarArista([0, 2]);
               mesh.agregarArista([0, 3]);
               mesh.agregarArista([1, 2]);
               mesh.agregarArista([1, 3]);
               mesh.agregarArista([2, 3]);
            
               mesh.agregarTriangulo(new Triangulo(3, 2, 0));
               mesh.agregarTriangulo(new Triangulo(3, 1, 2));
               mesh.agregarTriangulo(new Triangulo(3, 0, 1));
               mesh.agregarTriangulo(new Triangulo(2, 1, 0));
                return mesh;
            }
            piramide(tamaño){
                const size = tamaño/2;
                let mesh = new Mesh();
                
                mesh.agregarVertice(new Vector3(-1 * size, -1 * size, -1 * size));
                mesh.agregarVertice(new Vector3(-1 * size, -1 * size, 1 * size));
                mesh.agregarVertice(new Vector3(1 * size, -1 * size, -1 * size));
                mesh.agregarVertice(new Vector3(1 * size, -1 * size, 1 * size));
                mesh.agregarVertice(new Vector3(0, 1 * size, 0));
                /*
                -1, -1, -1   // izquierda, abajo , cerca   0
                -1, -1,  1   // izquierda, abajo , lejos   1
                 1, -1, -1   // derecha  , abajo , cerca   2
                 1, -1,  1   // derecha  , abajo , lejos   3
                 0,  1,  0   // centro   , centro, medio   4
                */
                mesh.agregarArista([4, 0]);
                mesh.agregarArista([4, 1]);
                mesh.agregarArista([4, 2]);
                mesh.agregarArista([4, 3]);
                mesh.agregarArista([0, 1]);
                mesh.agregarArista([0, 2]);
                mesh.agregarArista([1, 3]);
                mesh.agregarArista([2, 3]);
             
                mesh.agregarTriangulo(new Triangulo(4, 2, 0));
                mesh.agregarTriangulo(new Triangulo(4, 3, 2));
                mesh.agregarTriangulo(new Triangulo(4, 1, 3));
                mesh.agregarTriangulo(new Triangulo(4, 0, 1));
                mesh.agregarTriangulo(new Triangulo(0, 2, 3));
                mesh.agregarTriangulo(new Triangulo(0, 3, 1));
                return mesh;
            }

                {//triangulos
                    mesh.agregarTriangulo(new Triangulo(2, 6, 4));

                    mesh.agregarTriangulo(new Triangulo(3, 7, 6));

                }
         //                 3 -------- 7
         //               /|         /|
         //              / |        / |
         //             2 -------- 6  |
         //             |  |       |  |
         //             |  1 ------|--5
         //             | /        | /
         //             |/         |/
         //             0 -------- 4
                return mesh;
            }
            prisma_triangular(xt, yt, zt){
                let mesh = new Mesh();

                for (let x = -1; x <= 1; x+= 1)
                {
                    let y = 1;
                    if(x == -1 || x == 1) y = -1;
                    for (let z = -1; z <= 1; z+= 2)
                    {
                        mesh.agregarVertice(new Vector3(x * xt/2, y * yt/2, z * zt/2));
                    }
                }
                /*
                -1 | -1 | -1 ||  izquierda, abajo , cerca  ||  0
                -1 | -1 |  1 ||  izquierda, abajo , lejos  ||  1
                 0 |  1 | -1 ||  centro   , arriba, cerca  ||  2
                 0 |  1 |  1 ||  centro   , arriba, lejos  ||  3
                 1 | -1 | -1 ||  derecha  , abajo , cerca  ||  4
                 1 | -1 |  1 ||  derecha  , abajo , lejos  ||  5
                */

                mesh.agregarArista([0, 2]);
                mesh.agregarArista([0, 1]);
                mesh.agregarArista([0, 4]);
                mesh.agregarArista([1, 3]);
                mesh.agregarArista([1, 5]);
                mesh.agregarArista([2, 3]);
                mesh.agregarArista([2, 4]);
                mesh.agregarArista([3, 4]);
                
                mesh.agregarTriangulo(new Triangulo(2, 4, 0));
                mesh.agregarTriangulo(new Triangulo(3, 1, 5));
                mesh.agregarTriangulo(new Triangulo(2, 3, 5));
                mesh.agregarTriangulo(new Triangulo(2, 5, 4));
                mesh.agregarTriangulo(new Triangulo(3, 2, 0));
                mesh.agregarTriangulo(new Triangulo(3, 0, 1));
                mesh.agregarTriangulo(new Triangulo(0, 4, 5));
                mesh.agregarTriangulo(new Triangulo(0, 5, 1));
         //                 3 ------- 7
         //               /|         /|
         //              / |        / |
         //             2 -------- 6  |
         //             |  |       |  |
         //             |  1 ------|--5
         //             | /        | /
         //             |/         |/
         //             0 -------- 4

            }
            octaedro (xt, yt, zt){
                let mesh = new Mesh();
                
                for (let x = -1; x <= 1; x+= 1)
                {
                    if(x == 0)
                    {
                        for (let y = -1; y <= 1; y+= 2)
                        {
                            mesh.agregarVertice(new Vector3(0, y * yt/2, 0));
                        }
                    }
                    else
                    {
                        for (let z = -1; z <= 1; z+= 2)
                        {
                            mesh.agregarVertice(new Vector3(x * xt/2, 0, z * zt/2));
                        }
                    }
                }
                /*
                -1,  0, -1   // izquierda, centro, cerca   0
                -1,  0,  1   // izquierda, centro, lejos   1
                 0, -1,  0   // centro   , abajo , medio   2
                 0,  1,  0   // centro   , arriba, medio   3
                 1,  0, -1   // derecha  , centro, cerca   4
                 1,  0,  1   // derecha  , centro, lejos   5
                */
                mesh.agregarArista([2, 0]);
                mesh.agregarArista([2, 1]);
                mesh.agregarArista([2, 4]);
                mesh.agregarArista([2, 5]);
                mesh.agregarArista([3, 0]);
                mesh.agregarArista([3, 1]);
                mesh.agregarArista([3, 4]);
                mesh.agregarArista([3, 5]);
                mesh.agregarArista([0, 1]);
                mesh.agregarArista([1, 4]);
                mesh.agregarArista([4, 5]);
                mesh.agregarArista([5, 0]);
             
                mesh.agregarTriangulo(new Triangulo(2, 4, 0));
                mesh.agregarTriangulo(new Triangulo(2, 5, 4));
                mesh.agregarTriangulo(new Triangulo(2, 1, 5));
                mesh.agregarTriangulo(new Triangulo(2, 0, 1));
                mesh.agregarTriangulo(new Triangulo(0, 4, 3));
                mesh.agregarTriangulo(new Triangulo(1, 0, 3));
                mesh.agregarTriangulo(new Triangulo(4, 5, 3));
                mesh.agregarTriangulo(new Triangulo(5, 1, 3));
                return mesh;
            }
            
            
        }
        class Transform{
            constructor(x = 0, y = 0, z = 0){
                this.position = new Vector3(x, y, z);
                this.rotation = new Vector3(0, 0, 0);
                this.scale    = new Vector3(1, 1, 1);
            }

            moveby(vec)
            {
                this.position = this.position.add(vec);
            }
            moveto(vec)
            {
                this.position = vec;
            }

            rotateBy(vec)
            {
                this.rotation = this.rotation.add(vec);
            }
            rotateTo(vec)
            {
                this.rotation = vec;
            }

            scaleby(vec)
            {
                this.scale = this.scale.multiply(vec);
            }
            scaleTo(vec)
            {
                this.scale = vec;
            }
        }

        class Render{
            constructor()
            {
                this.canvas = canvas;
                this.ctx = ctx;
            }
            
            render(escena)
            {
                this.escena = escena;
                let triangulos = [];
                this.limpiar();

                escena.objetos.forEach(objeto => {
                    triangulos = this.renderObjeto(objeto, triangulos);
                });
                triangulos.sort((a, b) => b.profundidad - a.profundidad);
                triangulos.forEach(triangulo =>{
                    this.dibujarTriangulos(triangulo);
                })
                //console.log("------------------------------------------------------------");
            }
            renderObjeto(objeto, tr)
            {
                let vertices = [];
                let verticesMundo =[];
                let verticesCamara =[];
                for(let i = 0; i < objeto.mesh.vertices.length; i++)
                {
                    verticesMundo.push(this.toWorldSpace(objeto.mesh.vertices[i], objeto.transform));
                    verticesCamara.push(this.toCameraSpace(verticesMundo[i]));
                    vertices.push(this.project(verticesCamara[i]));
                    //console.log(vertices[i]);
                }
                //this.dibujarAristas(vertices, objeto.mesh.aristas);
                //let triangulos = 
                let normales = this.normales(verticesCamara, objeto.mesh.triangulos);
                let centros = this.getCenter(verticesCamara, objeto.mesh.triangulos);
                /*let centros_normales = [];
                centros.forEach(centro => {
                    centros_normales.push(centro.normalize());
                });
                */let triangulos = this.Backface_Culling(centros, normales, objeto.mesh.triangulos); 
                //triangulos.forEach(t => {
                for(let i = 0; i < triangulos.length; i++)
                {
                    let triangulo = new TrianguloRender();
                    triangulo.centro = triangulos[i][1];
                    triangulo.profundidad = triangulos[i][1].z;
                    triangulo.material = objeto.material;
                    triangulo.vertices = new Triangulo(vertices[triangulos[i][0].A], vertices[triangulos[i][0].B], vertices[triangulos[i][0].C]);
                    triangulo.normal = triangulos[i][2];
                    tr.push(triangulo);
                }
                return tr;
            }
            
            toWorldSpace(vertice, transform)
            {
                let v = vertice.multiply(transform.scale);

                v = v.rotateX(transform.rotation.x * Math.PI/180);
                v = v.rotateY(transform.rotation.y * Math.PI/180);
                v = v.rotateZ(transform.rotation.z * Math.PI/180);

                v = v.add(transform.position);

                return v;
            }
            toCameraSpace(vertice)
            {
                let v = vertice.subtract(this.escena.camara.transform.position);

                v = v.rotateX(-this.escena.camara.transform.rotation.x * Math.PI / 180);
                v = v.rotateY(-this.escena.camara.transform.rotation.y * Math.PI / 180);
                v = v.rotateZ(-this.escena.camara.transform.rotation.z * Math.PI / 180);
                
                if (v.z <= this.escena.camara.near || v.z >= this.escena.camara.far) {
                    return null;
                }
                
                //console.log(vertice);

                return v;
            }
            project(vertice)
            {
                if (vertice == null) return null;
                //console.log(vertice.toString());
                let x = vertice.x*this.escena.camara.focal/vertice.z;
                let y = vertice.y*this.escena.camara.focal/vertice.z;

                return new Vector2(x, y);
            }
            getCenter(vertices, t){
                let centros = [];
                for(let i = 0; i < t.length; i++)
                {
                    let centro = vertices[t[i].A].add(vertices[t[i].B])
                    centro = centro.add(vertices[t[i].C]);
                    centro = centro.multiply(new Vector3(1/3, 1/3, 1/3));
                    centros.push(centro);
                }
                return centros
            }
            normales(vertices, triangulos)
            {
                let n = [];
                for (const t of triangulos)
                {
                    n.push(this.getNormal(vertices, t))
                }
                return n;
            }
            getNormal(vertices, t)
            {
                let A = vertices[t.A];
                let B = vertices[t.B];
                let C = vertices[t.C];
                let normal = B.subtract(A).cross(C.subtract(A))

                return normal/*.normalize()*/;
            }
            Backface_Culling(centros, normales, t)
            {
                let triangulos = [];
                for(let i = 0; i < normales.length; i++)
                {
                    //console.log(/*"triangulo: " + i +*/ "-----normal: " + normales[i].toString()/* + "----------vector centro-camara" + centros[i].multiply(new Vector3(-1, -1, -1)) + "-------------dot producto:" + normales[i].dot(centros[i].multiply(new Vector3(-1, -1, -1)))*/)
                    //console.log("centro: ", centros[i].toString());
                    //console.log("centro-camara: ", centros[i].multiply(new Vector3(-1, -1, -1)).toString());
                    

                    if(normales[i].dot(centros[i].multiply(new Vector3(-1, -1, -1))) > 0)
                    {
                       /* console.log(
                            i,
                            normales[i].toString(),
                            centros[i].multiply(new Vector3(-1, -1, -1)).toString(),
                            normales[i].dot(centros[i].multiply(new Vector3(-1, -1, -1)))
                        );*/
                        triangulos.push([t[i], centros[i], normales[i]]);
                    }
                }
                return triangulos;
            }
            iluminacion(centro, luces, normal){
                let intensidad = 0;
                luces.forEach(luz => {
                    intensidad += this.getIntensidad(centro, luz, normal);
                });
                return intensidad;
            }
            getIntensidad(centro, luz, normal){
                return Math.max(0, normal.normalize().dot(luz.transform.position.subtract(centro).normalize()));
            }

            limpiar()
            {
                this.ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            dibujarAristas(vertices, aristas)
            {
                this.ctx.strokeStyle = "red";
                this.ctx.lineWidth = 5;
                aristas.forEach(arista => {
                    if (vertices[arista[0]] != null && vertices[arista[1]] != null)
                    {
                        this.ctx.beginPath();
                        this.ctx.moveTo(
                            vertices[arista[0]].x + this.canvas.width/2  ,
                            -vertices[arista[0]].y + this.canvas.height/2
                        );
                        this.ctx.lineTo(
                            vertices[arista[1]].x + this.canvas.width/2,
                            -vertices[arista[1]].y + this.canvas.height/2
                        );
                        this.ctx.stroke();
                    }
                });
            }
            dibujarTriangulos(triangulo)
            {
                //console.log(triangulo.centro);
                let luces = this.iluminacion(triangulo.centro, this.escena.luces, triangulo.normal);
                let intensidad = this.escena.ambiente + luces;
                this.ctx.fillStyle = "rgb(255, 0, 0)";
                console.log(this.ctx.fillStyle);
                this.ctx.fillStyle = triangulo.material.color.multiply(intensidad).toString();
                //console.log(intensidad);
                console.log(triangulo.material.color.multiply(intensidad).toString());
                console.log(this.ctx.fillStyle);
                console.log("------------------------------------------");
                let A = triangulo.vertices.A;
                let B = triangulo.vertices.B;
                let C = triangulo.vertices.C;
                this.ctx.beginPath();
                this.ctx.moveTo(
                        A.x + this.canvas.width/2  ,
                    -A.y + this.canvas.height/2
                );
                this.ctx.lineTo(
                        B.x + this.canvas.width/2,
                    -B.y + this.canvas.height/2
                );
                this.ctx.lineTo(
                        C.x + this.canvas.width/2,
                    -C.y + this.canvas.height/2
                );
                this.ctx.closePath();
                this.ctx.fill();
                ctx.strokeStyle = 'yellow';
                ctx.lineWidth = 3;
                ctx.stroke();
                /*triangulos.forEach(triangulo => {
                    if (vertices[triangulo.A] != null && vertices[triangulo.B] != null && vertices[triangulo.C] != null)
                    {
                        //console.log(triangulo);
                        
                    }
                });*/
            }
        

        }
        class TrianguloRender{
            constructor(){
                this.vertices = [];
                this.profundidad = 0;
                this.material = null;
                this.normal = null;
                this.centro = null;
            }
        }
        class Ligth{
            constructor(){
                this.transform = new Transform();
                this.color = { r: 255, g: 255, b: 255 };
                this.intensidad = 1;
            }
        }
        
        let luz = new Ligth();
        let cam = new Camara(0, 0, -200, 200);
        let escena1 = new Escena();
        let renderer = new Render();
        let figuras = new Primitivas()
        let cubomesh = figuras.cubo(1);
        let tetraedro = figuras.octaedro(1, 1, 1);
        escena1.cambiar_camara(cam);

        luz.transform.position = cam.transform.position;
        luz.transform.moveby(new Vector3(200, 0, 0));
        escena1.agregar_luz(luz);
        
        let cubo1 = new Figura3D(cubomesh);
        let cubo2 = new Figura3D(cubomesh);
        let tetraedro1 = new Figura3D(tetraedro);

        escena1.agregar(cubo1);
        escena1.agregar(cubo2);
        escena1.agregar(tetraedro1);

        tetraedro1.transform.scaleTo(new Vector3(50, 50, 50));
        tetraedro1.transform.moveto(new Vector3(0, 0, -100));

        cubo1.transform.scaleTo(new Vector3(50, 50, 50));

        cubo2.transform.scaleTo(new Vector3(50, 50, 50));
        cubo2.transform.moveto(new Vector3(0, 0, 200));
        cubo2.material.changeColor(new Color(0, 0, 255));

        renderer.render(escena1);

        let i = 3, l = 3;
        let i1 = -2, l1 = 2;
        let ii = 0;
        function loop()
        {
            tetraedro1.transform.rotateBy(new Vector3(0, 1, 0));
            cubo1.transform.rotateBy(new Vector3(0, -ii, 0));
            cubo2.transform.rotateBy(new Vector3(1, 0, 2));
            cubo2.transform.moveby(new Vector3(i, l, 0));
            //tetraedro1.transform.moveby(new Vector3(i1, l1, 0));
            if(Math.abs(cubo2.transform.position.x) > (canvas.width/2) - 20)
            {
                i *= -1;
            }
            if(Math.abs(cubo2.transform.position.y) > (canvas.height/2) - 20)
            {
                l *= -1;
            }
            if(Math.abs(tetraedro1.transform.position.x) > (canvas.width/2) - 250)
            {
                i1 *= -1;
            }
            if(Math.abs(tetraedro1.transform.position.y) > (canvas.height/2) - 250)
            {
                l1 *= -1;
            }
            renderer.render(escena1);
            requestAnimationFrame(loop);
        }
        loop();

        /*console.log(canvas.height);
        console.log(canvas.width);*/

        document.addEventListener("click", (event) => {
            ii++;
        });
        mouse["x"] = 0;
        mouse["y"] = 0;
        mouse["z"] = 0;
        document.addEventListener("mousemove", (event) => {
            mouse["x"] = event.clientX - canvas.width/2;
            mouse["y"] = -event.clientY + canvas.height/2;

            cubo1.transform.moveto(new Vector3(mouse["x"], mouse["y"], mouse["z"]));
        });
        canvas.addEventListener('wheel', (evento) => {
            evento.preventDefault(); 

            mouse["z"] -= evento.deltaY/100;
            cubo1.transform.moveto(new Vector3(mouse["x"], mouse["y"], mouse["z"]));
            //evento.deltaY < 0) 
        });

    </script>
